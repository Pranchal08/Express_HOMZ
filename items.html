<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Items Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Available Items</h2>

  <!-- Filter Section -->
  <div class="row mb-4">
    <div class="col-md-4">
      <input type="text" id="category" class="form-control" placeholder="Filter by Category">
    </div>
    <div class="col-md-4">
      <input type="number" id="price" class="form-control" placeholder="Max Price">
    </div>
    <div class="col-md-4">
      <button class="btn btn-primary w-100" onclick="getItems()">Search</button>
    </div>
  </div>

  <!-- Items Table -->
  <div class="table-responsive">
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="itemsTable"></tbody>
    </table>
  </div>
</div>

<script>
async function getItems() {
  const token = localStorage.getItem("jwt");
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;

  let url = "http://localhost/ecommerce/api/items.php";
  const params = [];
  if (category) params.push("category=" + encodeURIComponent(category));
  if (price) params.push("price=" + encodeURIComponent(price));
  if (params.length > 0) url += "?" + params.join("&");

  const res = await fetch(url, {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();
  const tableBody = document.getElementById("itemsTable");
  tableBody.innerHTML = "";

  if (data.error) {
    tableBody.innerHTML = <tr><td colspan="4" class="text-danger">${data.error}</td></tr>;
    return;
  }

  data.forEach(item => {
    tableBody.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.name}</td>
        <td>${item.category}</td>
        <td>₹${item.price}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
